<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Dungeon Knights</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace;}
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
canvas{display:block;image-rendering:pixelated;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 30%,#0d0d2b,#050508 70%);z-index:20;overflow-y:auto;padding:10px 0 20px;}
.screen.hidden{display:none;}
.title-glow{font-size:clamp(16px,4.5vw,34px);color:#f0c060;text-shadow:0 0 20px #f09000,0 0 60px #f06000;letter-spacing:4px;text-align:center;animation:tP 2s ease-in-out infinite;padding:0 10px;}
@keyframes tP{0%,100%{text-shadow:0 0 20px #f09000,0 0 60px #f06000;}50%{text-shadow:0 0 40px #ffb000,0 0 120px #ff8000;}}
.title-sub{font-size:clamp(5px,1.4vw,8px);color:#555;letter-spacing:3px;margin:8px 0 22px;text-align:center;}
.char-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 10px;width:100%;max-width:540px;}
@media(min-width:600px){.char-grid{grid-template-columns:repeat(4,1fr);max-width:820px;}}
.char-card{border:2px solid #2a2a44;border-radius:8px;padding:10px 7px;cursor:pointer;background:linear-gradient(160deg,#10101e,#0a0a16);transition:all .2s;}
.char-card.selected,.char-card:hover{transform:translateY(-3px);border-color:var(--a);}
.char-preview{display:block;margin:0 auto 6px;image-rendering:pixelated;}
.char-name{font-size:clamp(5px,1.3vw,7px);color:var(--a);margin-bottom:2px;text-align:center;}
.char-cls{font-size:clamp(4px,.9vw,5px);color:#777;text-align:center;margin-bottom:5px;}
.skill-list{font-size:clamp(3px,.8vw,5px);color:#999;margin-bottom:4px;}
.skill-list div{margin:1px 0;}
.stat-row{display:flex;justify-content:space-between;font-size:clamp(3px,.7vw,5px);color:#555;margin:1px 0;}
.stat-row span:last-child{color:#ccc;}
.btn-start{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2vw,11px);padding:13px 30px;background:linear-gradient(135deg,#b02020,#7a1010);color:#fff;border:2px solid #e03030;border-radius:6px;cursor:pointer;margin-top:16px;box-shadow:0 0 22px rgba(200,40,40,.5);}
#gameWrap{position:relative;width:100%;height:100%;}
#gameCanvas{width:100%;height:100%;}
#hud{position:absolute;top:0;left:0;right:0;pointer-events:none;padding:7px 10px;display:flex;justify-content:space-between;z-index:5;}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:3px;}
.bar-wrap{display:flex;align-items:center;gap:4px;}
.bar-lbl{font-size:6px;color:#888;width:13px;}
.bar-outer{width:clamp(65px,16vw,105px);height:7px;background:#1a1a1a;border:1px solid #333;border-radius:2px;overflow:hidden;}
.bar-inner{height:100%;transition:width .15s;border-radius:2px;}
#hpFill{background:linear-gradient(90deg,#7a1515,#e03030);}
#mpFill{background:linear-gradient(90deg,#152a7a,#3060e0);}
.hud-stat{font-size:6px;color:#f0c060;text-align:right;}
/* SKILL BAR */
#skillBar{position:absolute;bottom:172px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:6;}
@media(max-width:480px){#skillBar{gap:3px;bottom:180px;}}
.sk{width:46px;height:46px;border-radius:8px;background:rgba(8,8,22,.9);border:2px solid #2a2a44;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer;pointer-events:all;backdrop-filter:blur(5px);transition:border-color .15s;}
.sk:active{transform:scale(.93);}
.sk.rdy{border-color:#444;}
.sk.ocd{border-color:#1e1e30;}
.sk-em{font-size:17px;line-height:1;}
.sk-k{font-size:5px;color:#555;margin-top:1px;}
.sk-cd{position:absolute;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;font-size:7px;color:#bbb;border-radius:6px;}
/* MOBILE */
#mCtrl{position:absolute;bottom:0;left:0;right:0;height:165px;pointer-events:none;display:none;}
@media(max-width:900px),(pointer:coarse){#mCtrl{display:block;}}
#jZone{position:absolute;bottom:18px;left:18px;width:130px;height:130px;pointer-events:all;}
#jBase{position:absolute;inset:0;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.12);}
#jKnob{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.44);top:50%;left:50%;transform:translate(-50%,-50%);}
#rBtns{position:absolute;bottom:18px;right:14px;display:flex;flex-direction:column;gap:7px;align-items:flex-end;pointer-events:all;}
.abtn{border-radius:50%;border:2px solid rgba(255,255,255,.25);background:rgba(12,12,30,.85);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none;}
#sBtn{width:62px;height:62px;border-color:#d03030;font-size:22px;}
#sBtn.f{background:rgba(160,25,25,.6);}
#nrBtn{font-family:'Press Start 2P',monospace;font-size:6px;padding:7px 11px;background:rgba(0,150,65,.2);border:2px solid #00b060;border-radius:6px;color:#00e860;cursor:pointer;display:none;pointer-events:all;position:absolute;bottom:178px;right:14px;z-index:7;}
#goScr{gap:10px;}
#goScr h2{font-size:clamp(14px,4vw,24px);color:#e03030;text-shadow:0 0 20px #c02020;}
.go-s{font-size:clamp(6px,1.4vw,8px);color:#999;text-align:center;line-height:2.4;}
.go-s span{color:#f0c060;}
#fBanner{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);font-size:clamp(10px,3vw,18px);color:#f0c060;text-shadow:0 0 20px #f09000;pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap;text-align:center;z-index:15;}
.screen::-webkit-scrollbar{width:4px;}.screen::-webkit-scrollbar-thumb{background:#333;}
</style>
</head>
<body>
<div id="root">
<div class="screen" id="titleSc">
  <div class="title-glow">⚔ DUNGEON<br>KNIGHTS</div>
  <div class="title-sub">— CHOOSE YOUR CHAMPION —</div>
  <div class="char-grid" id="charGrid"></div>
  <button class="btn-start" id="startBtn">▶ BEGIN QUEST</button>
</div>
<div id="gameWrap" class="hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-left">
      <div class="bar-wrap"><span class="bar-lbl">❤</span><div class="bar-outer"><div class="bar-inner" id="hpFill"></div></div></div>
      <div class="bar-wrap"><span class="bar-lbl">✦</span><div class="bar-outer"><div class="bar-inner" id="mpFill"></div></div></div>
    </div>
    <div class="hud-right">
      <div class="hud-stat" id="statF">FL.1 RM.1</div>
      <div class="hud-stat" id="statK">☠ 0</div>
      <div class="hud-stat" id="statC" style="color:#aaa;font-size:5px;"></div>
    </div>
  </div>
  <div id="fBanner"></div>
  <div id="skillBar">
    <div class="sk" id="sk0"><span class="sk-em" id="s0e">?</span><span class="sk-k">1</span><div class="sk-cd" id="s0c" style="display:none"></div></div>
    <div class="sk" id="sk1"><span class="sk-em" id="s1e">?</span><span class="sk-k">2</span><div class="sk-cd" id="s1c" style="display:none"></div></div>
    <div class="sk" id="sk2"><span class="sk-em" id="s2e">?</span><span class="sk-k">3</span><div class="sk-cd" id="s2c" style="display:none"></div></div>
    <div class="sk" id="sk3"><span class="sk-em" id="s3e">?</span><span class="sk-k">4</span><div class="sk-cd" id="s3c" style="display:none"></div></div>
  </div>
  <div id="mCtrl">
    <div id="jZone"><div id="jBase"></div><div id="jKnob"></div></div>
    <div id="rBtns"><div id="sBtn" class="abtn">🔥</div></div>
  </div>
  <div id="nrBtn">➜ NEXT</div>
</div>
<div class="screen hidden" id="goScr">
  <h2>☠ YOU DIED ☠</h2>
  <div class="go-s" id="goStats"></div>
  <button class="btn-start" id="retryBtn">↩ MENU</button>
</div>
</div>
<script>
'use strict';
const TILE=36,COLS=22,ROWS=17,MW=COLS*TILE,MH=ROWS*TILE;
const rng=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
const rf=()=>Math.random();
const dst=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

// ── SKILLS ──────────────────────────────
const SK={
  knight:[
    {name:'Shield Bash',emoji:'🛡',cd:4500,mp:15,desc:'Stun nearby 3s',fn(g){let n=0;g.en.forEach(e=>{if(e.a&&dst(e,g.p)<165){e.stun=3200;n++;g.fx(e.x,e.y,'#ffd060',10,4,400);}});g.fx(g.p.x,g.p.y,'#ffd060',28,7,600);g.msg(`Shield Bash! ${n} stunned!`,'#ffd060');}},
    {name:'War Cry',emoji:'📣',cd:7000,mp:20,desc:'+50% DMG 5s',fn(g){g.p.dMul=1.5;g.p.dT=5000;g.fx(g.p.x,g.p.y,'#ff9900',22,5,500);g.msg('War Cry! DMG+50%','#ff9900');}},
    {name:'Iron Skin',emoji:'🪖',cd:9000,mp:25,desc:'4s invincibility',fn(g){g.p.if=4000;g.fx(g.p.x,g.p.y,'#88aaff',24,5,700);g.msg('Iron Skin!','#88aaff');}},
    {name:'Blade Storm',emoji:'⚔️',cd:12000,mp:30,desc:'12 swords outward',fn(g){for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2;g.bl.push({x:g.p.x,y:g.p.y,vx:Math.cos(a)*9,vy:Math.sin(a)*9,dmg:g.cls.dmg*2,col:'#ffd060',sz:9,life:900,fp:1});}g.fx(g.p.x,g.p.y,'#ffd060',35,8,700);g.msg('Blade Storm!','#ffd060');}}
  ],
  mage:[
    {name:'Nova Burst',emoji:'💫',cd:5500,mp:30,desc:'8 bolts outward',fn(g){for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;g.bl.push({x:g.p.x,y:g.p.y,vx:Math.cos(a)*12,vy:Math.sin(a)*12,dmg:g.cls.dmg*1.7,col:'#c088ff',sz:11,life:800,fp:1});}g.fx(g.p.x,g.p.y,'#c088ff',30,8,600);g.msg('Nova Burst!','#c088ff');}},
    {name:'Mana Shield',emoji:'🔵',cd:8000,mp:40,desc:'40pt absorb shield',fn(g){g.p.sh=40;g.fx(g.p.x,g.p.y,'#4488ff',20,4,500);g.msg('Mana Shield!','#4488ff');}},
    {name:'Blizzard',emoji:'❄️',cd:10000,mp:35,desc:'Slow all enemies 4s',fn(g){g.en.forEach(e=>{if(e.a){e.slow=4000;g.fx(e.x,e.y,'#aaddff',8,2,500);}});g.fx(g.p.x,g.p.y,'#aaddff',28,5,600);g.msg('Blizzard!','#aaddff');}},
    {name:'Meteor',emoji:'☄️',cd:14000,mp:50,desc:'5 meteors on enemies',fn(g){const ts=g.en.filter(e=>e.a).slice(0,5);if(!ts.length){g.msg('No targets!','#f66');return;}ts.forEach((e,i)=>setTimeout(()=>{if(!e.a)return;g.fx(e.x,e.y,'#ff6644',18,6,500);e.hp-=g.cls.dmg*4;if(e.hp<=0){e.a=0;g.kills++;g.fx(e.x,e.y,e.col,14,5,400);}},i*200));g.msg('Meteor!','#ff6644');}}
  ],
  rogue:[
    {name:'Blink Dash',emoji:'💨',cd:3000,mp:20,desc:'Teleport 120px fwd',fn(g){const nx=g.p.x+Math.cos(g.p.ang)*120,ny=g.p.y+Math.sin(g.p.ang)*120;const cx=Math.max(TILE+14,Math.min(MW-TILE-14,nx)),cy=Math.max(TILE+14,Math.min(MH-TILE-14,ny));if(!sR(g.map,cx,cy,14)){g.fx(g.p.x,g.p.y,'#40ff88',14,5,350);g.p.x=cx;g.p.y=cy;g.p.if=280;}g.msg('Blink!','#40ff88');}},
    {name:'Smoke Bomb',emoji:'💣',cd:6000,mp:25,desc:'Stun+2s iframes',fn(g){g.p.if=2000;g.en.forEach(e=>{if(e.a&&dst(e,g.p)<200){e.stun=2000;g.fx(e.x,e.y,'#aaa',8,2,400);}});g.fx(g.p.x,g.p.y,'#888',25,5,600);g.msg('Smoke Bomb!','#aaaaaa');}},
    {name:'Poison Blades',emoji:'🗡️',cd:8000,mp:30,desc:'Poison bullets 5s',fn(g){g.p.pT=5000;g.fx(g.p.x,g.p.y,'#44ff66',20,4,500);g.msg('Poison Blades!','#44ff66');}},
    {name:'Death Mark',emoji:'💀',cd:12000,mp:40,desc:'Mark: enemy dies 3s',fn(g){let nr=null,nd=Infinity;g.en.forEach(e=>{if(e.a){const d=dst(e,g.p);if(d<nd){nd=d;nr=e;}}});if(nr){nr.dm=3000;g.fx(nr.x,nr.y,'#ff2244',15,5,500);g.msg('Death Mark!','#ff2244');}else g.msg('No target!','#f44');}}
  ],
  engineer:[
    {name:'Turret Drop',emoji:'🤖',cd:7000,mp:25,desc:'Deploy turret 15s',fn(g){g.turrets.push({x:g.p.x,y:g.p.y,life:15000,cd:0});g.fx(g.p.x,g.p.y,'#ff8040',15,4,400);g.msg('Turret!','#ff8040');}},
    {name:'EMP Blast',emoji:'⚡',cd:6000,mp:20,desc:'Clear bullets+stun',fn(g){g.ebl=[];g.en.forEach(e=>{if(e.a&&dst(e,g.p)<250){e.stun=2500;g.fx(e.x,e.y,'#ffff00',10,3,400);}});g.fx(g.p.x,g.p.y,'#ffff00',30,7,600);g.msg('EMP!','#ffff00');}},
    {name:'Overclock',emoji:'⚙️',cd:9000,mp:30,desc:'Fire rate x3 for 4s',fn(g){g.p.ocT=4000;g.fx(g.p.x,g.p.y,'#ff8040',20,4,500);g.msg('Overclock x3!','#ff8040');}},
    {name:'Missile Salvo',emoji:'🚀',cd:11000,mp:35,desc:'6 homing missiles',fn(g){const ts=g.en.filter(e=>e.a).slice(0,6);ts.forEach((t,i)=>{const a=Math.atan2(t.y-g.p.y,t.x-g.p.x)+(i-2.5)*0.18;g.bl.push({x:g.p.x,y:g.p.y,vx:Math.cos(a)*10,vy:Math.sin(a)*10,dmg:g.cls.dmg*2.5,col:'#ff4400',sz:7,life:1100,fp:1,hom:t});});g.fx(g.p.x,g.p.y,'#ff4400',20,6,500);g.msg('Salvo!','#ff4400');}}
  ]
};

// ── CLASSES ──────────────────────────────
const CLS=[
  {id:'knight',name:'IRONCLAD',  label:'Knight',  col:'#d4a030',ac:'#ffd060',hp:160,mp:80, spd:2.4,dmg:22,fr:360,bs:7.5,bsz:7, bc:'#ffd060',stats:{HP:5,SP:2,DM:3,RT:2}},
  {id:'mage',  name:'ARCHMAGE',  label:'Mage',    col:'#9060d0',ac:'#c088ff',hp:85, mp:180,spd:3.0,dmg:30,fr:630,bs:11, bsz:10,bc:'#c088ff',stats:{HP:2,SP:3,DM:5,RT:3}},
  {id:'rogue', name:'SHADOWBLADE',label:'Rogue',  col:'#20b060',ac:'#40ff88',hp:105,mp:110,spd:3.9,dmg:14,fr:160,bs:10, bsz:5, bc:'#40ff88',stats:{HP:3,SP:5,DM:2,RT:5}},
  {id:'eng',   name:'MECHWRIGHT',label:'Engineer',col:'#d06020',ac:'#ff8040',hp:120,mp:100,spd:2.6,dmg:20,fr:280,bs:8.5,bsz:6, bc:'#ff8040',stats:{HP:3,SP:2,DM:4,RT:3}}
];
CLS[3].id='engineer'; // ensure id matches skill key

// ── PREVIEW ──────────────────────────────
function drawPrev(cv,cls){
  const c=cv.getContext('2d'),cx=cv.width/2,cy=cv.height/2+4;
  c.clearRect(0,0,cv.width,cv.height);
  c.fillStyle='rgba(0,0,0,.4)';c.beginPath();c.ellipse(cx,cy+15,11,4,0,0,Math.PI*2);c.fill();
  c.fillStyle=cls.col;c.fillRect(cx-9,cy-10,18,17);
  c.fillStyle='#f5c89a';c.fillRect(cx-7,cy-22,14,13);
  c.fillStyle='#333';c.fillRect(cx-4,cy-17,3,3);c.fillRect(cx+1,cy-17,3,3);
  const id=cls.id;
  if(id==='knight'){c.fillStyle='#7a8a9a';c.fillRect(cx-8,cy-25,16,7);c.fillRect(cx-10,cy-20,20,3);c.fillStyle='#6a7a8a';c.fillRect(cx-15,cy-10,8,13);c.fillStyle=cls.ac;c.fillRect(cx-14,cy-9,6,11);c.fillStyle='#bbb';c.fillRect(cx+10,cy-20,3,24);}
  else if(id==='mage'){c.fillStyle=cls.col;c.beginPath();c.moveTo(cx,cy-36);c.lineTo(cx-11,cy-22);c.lineTo(cx+11,cy-22);c.closePath();c.fill();c.fillRect(cx-12,cy-24,24,4);c.fillStyle='#6b4c14';c.fillRect(cx+11,cy-22,3,28);c.fillStyle=cls.ac;c.beginPath();c.arc(cx+12,cy-24,5,0,Math.PI*2);c.fill();}
  else if(id==='rogue'){c.fillStyle='#165028';c.fillRect(cx-9,cy-28,18,9);c.fillRect(cx-7,cy-24,5,7);c.fillRect(cx+2,cy-24,5,7);c.fillStyle='#bbb';c.fillRect(cx-15,cy-14,2,15);c.fillRect(cx+13,cy-14,2,15);}
  else{c.fillStyle='#222';c.fillRect(cx-7,cy-20,6,5);c.fillRect(cx+1,cy-20,6,5);c.fillStyle=cls.ac;c.fillRect(cx-6,cy-19,4,3);c.fillRect(cx+2,cy-19,4,3);c.fillStyle='#999';c.fillRect(cx+11,cy-16,4,22);c.fillRect(cx+9,cy-18,8,4);c.fillRect(cx+9,cy+4,8,4);}
}

function buildSel(cb){
  const grid=document.getElementById('charGrid');grid.innerHTML='';let sel=0;
  CLS.forEach((cls,i)=>{
    const card=document.createElement('div');card.className='char-card'+(i===0?' selected':'');card.style.setProperty('--a',cls.ac);
    const pc=document.createElement('canvas');pc.width=70;pc.height=70;pc.className='char-preview';
    const sk=SK[cls.id];const stars=n=>'●'.repeat(n)+'○'.repeat(5-n);
    card.innerHTML=`<div class="char-name">${cls.name}</div><div class="char-cls">${cls.label}</div>
      <div class="skill-list">${sk.map(s=>`<div>${s.emoji} <span style="color:#888">${s.name}</span></div>`).join('')}</div>
      <div class="stat-row"><span>HP</span><span style="color:${cls.ac}">${stars(cls.stats.HP)}</span></div>
      <div class="stat-row"><span>SPD</span><span style="color:${cls.ac}">${stars(cls.stats.SP)}</span></div>
      <div class="stat-row"><span>DMG</span><span style="color:${cls.ac}">${stars(cls.stats.DM)}</span></div>`;
    card.insertBefore(pc,card.firstChild);
    card.addEventListener('click',()=>{document.querySelectorAll('.char-card').forEach(c=>c.classList.remove('selected'));card.classList.add('selected');sel=i;});
    grid.appendChild(card);setTimeout(()=>drawPrev(pc,cls),30);
  });
  document.getElementById('startBtn').onclick=()=>cb(sel);
}

// ── MAP ──────────────────────────────────
function genMap(floor){
  const m=Array.from({length:ROWS},()=>Array(COLS).fill(1));
  for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++)m[r][c]=0;
  const n=4+Math.floor(Math.random()*(3+Math.min(floor,5)));
  for(let i=0;i<n;i++){const pr=rng(2,ROWS-4),pc=rng(2,COLS-4);m[pr][pc]=m[pr][pc+1]=m[pr+1][pc]=m[pr+1][pc+1]=1;}
  for(let i=0;i<rng(1,3);i++){const r=rng(2,ROWS-3),c=rng(2,COLS-6),l=rng(3,6);for(let j=0;j<l;j++)if(c+j<COLS-1)m[r][c+j]=1;}
  for(let r=(ROWS/2-2)|0;r<=(ROWS/2+2)|0;r++)for(let c=(COLS/2-3)|0;c<=(COLS/2+3)|0;c++)m[r][c]=0;
  return m;
}
const sol=(m,px,py)=>{const c=px/TILE|0,r=py/TILE|0;if(r<0||r>=ROWS||c<0||c>=COLS)return true;return m[r][c]===1;};
const sR=(m,x,y,hw)=>sol(m,x-hw,y-hw)||sol(m,x+hw,y-hw)||sol(m,x-hw,y+hw)||sol(m,x+hw,y+hw);

// ── DIFFICULTY ───────────────────────────
function dif(floor){
  if(floor===1)return{hp:.33,sp:.38,dmg:.28,srd:5.5,cnt:3};   // VERY EASY
  if(floor===2)return{hp:.52,sp:.52,dmg:.48,srd:3.8,cnt:5};
  if(floor===3)return{hp:.75,sp:.68,dmg:.68,srd:3.0,cnt:6};
  if(floor===4)return{hp:.92,sp:.82,dmg:.85,srd:2.4,cnt:7};
  if(floor===5)return{hp:1.1,sp:.96,dmg:.98,srd:2.0,cnt:8};
  return{hp:1.0+floor*.1,sp:1.0+floor*.04,dmg:1.0+floor*.07,srd:Math.max(1.4,2.0-floor*.04),cnt:8+Math.floor(floor*.4)};
}

// ── GAME CLASS ───────────────────────────
class Game{
  constructor(idx){
    const cls=CLS[idx];this.cls=cls;
    this.sks=SK[cls.id].map(s=>({...s,cl:0}));
    this.floor=1;this.room=1;this.kills=0;
    this.map=genMap(1);this.roomCleared=false;
    this.p={x:MW/2,y:MH/2,hp:cls.hp,mhp:cls.hp,mp:cls.mp,mmp:cls.mp,ang:0,if:0,sc:0,sz:14,
            dMul:1,dT:0,sh:0,ocT:0,pT:0,cls};
    this.bl=[];this.ebl=[];this.en=[];this.pts=[];this.pk=[];this.turrets=[];this.msgs=[];
    this.inp={dx:0,dy:0,sh:false};this.keys={};
    this._spawn();
  }
  _spawn(){
    this.en=[];const d=dif(this.floor);const cnt=d.cnt+Math.floor(this.room*.9);
    for(let i=0;i<cnt;i++){
      let ex,ey,t=0;
      do{ex=rng(2,COLS-3)*TILE+TILE/2;ey=rng(2,ROWS-3)*TILE+TILE/2;t++;}
      while(t<80&&(sR(this.map,ex,ey,16)||dst({x:ex,y:ey},this.p)<220));
      if(t>=80)continue;
      const r=rf(),type=r<.35?'g':r<.60?'r':r<.80?'h':'m';
      this.en.push(this._me(type,ex,ey,d));
    }
  }
  _me(type,x,y,d){
    const b={x,y,type,a:1,stun:0,slow:0,dm:0,pT:0,pD:0,sc:rng(80,220)*d.srd,sz:0,sp:0,dmg:0,sr:0,rng:0,hp:0,mhp:0,col:'#fff'};
    if(type==='g')return{...b,hp:Math.ceil(30*d.hp),mhp:Math.ceil(30*d.hp),sp:58*d.sp,  dmg:Math.ceil(9*d.dmg), sr:Math.round(185*d.srd),rng:215,sz:11,col:'#c03030'};
    if(type==='r')return{...b,hp:Math.ceil(20*d.hp),mhp:Math.ceil(20*d.hp),sp:100*d.sp, dmg:Math.ceil(11*d.dmg),sr:9999,          rng:30, sz:10,col:'#e07020'};
    if(type==='h')return{...b,hp:Math.ceil(70*d.hp),mhp:Math.ceil(70*d.hp),sp:33*d.sp,  dmg:Math.ceil(18*d.dmg),sr:Math.round(260*d.srd),rng:275,sz:16,col:'#8030c0'};
                  return{...b,hp:Math.ceil(40*d.hp),mhp:Math.ceil(40*d.hp),sp:48*d.sp,  dmg:Math.ceil(12*d.dmg),sr:Math.round(215*d.srd),rng:315,sz:12,col:'#2080d0'};
  }
  fx(x,y,col,n,sp,life){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2;this.pts.push({x,y,vx:Math.cos(a)*sp*(0.5+rf()),vy:Math.sin(a)*sp*(0.5+rf()),life,ml:life,col,sz:2+rf()*3});}}
  msg(txt,col='#f0c060'){this.msgs=[{txt,col,t:2.8},...this.msgs.slice(0,2)];}
  use(i){const sk=this.sks[i];if(!sk||sk.cl>0)return;if(this.p.mp<sk.mp){this.msg('Low MP!','#f44');return;}this.p.mp-=sk.mp;sk.cl=sk.cd;sk.fn(this);}
  shoot(){
    const p=this.p,c=this.cls;if(p.sc>0)return;
    const fr=p.ocT>0?c.fr/3:c.fr;p.sc=fr;
    const bx=p.x+Math.cos(p.ang)*20,by=p.y+Math.sin(p.ang)*20;
    const dmg=Math.round(c.dmg*(p.dMul||1));
    const b={x:bx,y:by,vx:Math.cos(p.ang)*c.bs,vy:Math.sin(p.ang)*c.bs,dmg,col:c.bc,sz:c.bsz,life:900,fp:1};
    if(p.pT>0)b.poi=1;
    this.bl.push(b);this.fx(bx,by,c.bc,3,2,180);
  }
  update(dt){
    const ms=dt*1000,p=this.p,c=this.cls,map=this.map;
    // Move joystick
    const{dx,dy,sh:shooting}=this.inp,jl=Math.hypot(dx,dy);
    if(jl>0){const nx=p.x+(dx/jl)*c.spd*ms*.06,ny=p.y+(dy/jl)*c.spd*ms*.06;if(!sR(map,nx,p.y,14))p.x=nx;if(!sR(map,p.x,ny,14))p.y=ny;p.x=Math.max(TILE+14,Math.min(MW-TILE-14,p.x));p.y=Math.max(TILE+14,Math.min(MH-TILE-14,p.y));}
    // Keyboard move
    let kx=0,ky=0;
    if(this.keys['w']||this.keys['arrowup'])ky=-1;if(this.keys['s']||this.keys['arrowdown'])ky=1;
    if(this.keys['a']||this.keys['arrowleft'])kx=-1;if(this.keys['d']||this.keys['arrowright'])kx=1;
    if(kx||ky){const kl=Math.hypot(kx,ky),nx=p.x+(kx/kl)*c.spd*ms*.06,ny=p.y+(ky/kl)*c.spd*ms*.06;if(!sR(map,nx,p.y,14))p.x=nx;if(!sR(map,p.x,ny,14))p.y=ny;p.x=Math.max(TILE+14,Math.min(MW-TILE-14,p.x));p.y=Math.max(TILE+14,Math.min(MH-TILE-14,p.y));}
    if(p.sc>0)p.sc-=ms;if(p.if>0)p.if-=ms;
    if(p.dT>0){p.dT-=ms;if(p.dT<=0)p.dMul=1;}if(p.ocT>0)p.ocT-=ms;if(p.pT>0)p.pT-=ms;
    if(shooting||this.keys[' '])this.shoot();
    this.sks.forEach(sk=>{if(sk.cl>0)sk.cl=Math.max(0,sk.cl-ms);});
    p.mp=Math.min(p.mmp,p.mp+ms*.005);
    // Player bullets
    this.bl=this.bl.filter(b=>{
      if(b.hom&&b.hom.a){const ang=Math.atan2(b.hom.y-b.y,b.hom.x-b.x);b.vx=b.vx*.9+Math.cos(ang)*1.5;b.vy=b.vy*.9+Math.sin(ang)*1.5;const sp=Math.hypot(b.vx,b.vy);if(sp>10){b.vx=b.vx/sp*10;b.vy=b.vy/sp*10;}}
      b.x+=b.vx;b.y+=b.vy;b.life-=ms;
      if(b.life<=0||sR(map,b.x,b.y,b.sz)){this.fx(b.x,b.y,b.col,4,2,200);return false;}
      for(let i=this.en.length-1;i>=0;i--){const e=this.en[i];if(!e.a)continue;if(dst(b,e)<e.sz+b.sz){e.hp-=b.dmg;if(b.poi){e.pT=5000;e.pD=b.dmg*.12;}this.fx(b.x,b.y,b.col,5,3,250);if(e.hp<=0){e.a=0;this.kills++;this.fx(e.x,e.y,e.col,14,5,500);if(rf()<.33)this.pk.push({x:e.x,y:e.y,hp:rf()<.6,life:9000});}return false;}}
      return true;
    });
    // Enemy bullets
    this.ebl=this.ebl.filter(b=>{
      b.x+=b.vx;b.y+=b.vy;b.life-=ms;
      if(b.life<=0||sR(map,b.x,b.y,5)){this.fx(b.x,b.y,'#ff4444',3,1.5,150);return false;}
      if(p.if<=0&&dst(b,p)<p.sz+5){let dm=b.dmg;if(p.sh>0){const ab=Math.min(p.sh,dm);p.sh-=ab;dm-=ab;this.fx(p.x,p.y,'#4488ff',8,3,300);}if(dm>0){p.hp-=dm;p.if=450;this.fx(p.x,p.y,'#ff4444',8,3,350);}return false;}
      return true;
    });
    // Enemies
    this.en.forEach(e=>{
      if(!e.a)return;
      if(e.dm>0){e.dm-=ms;if(e.dm<=0){e.a=0;this.kills++;this.fx(e.x,e.y,'#ff2244',20,6,600);if(rf()<.5)this.pk.push({x:e.x,y:e.y,hp:true,life:9000});return;}if(rf()<.03)this.fx(e.x,e.y,'#ff2244',1,1,300);}
      if(e.pT>0){e.pT-=ms;e.hp-=(e.pD||1.5)*ms*.001;if(rf()<.04)this.fx(e.x,e.y,'#44ff66',2,1,300);if(e.hp<=0){e.a=0;this.kills++;this.fx(e.x,e.y,e.col,10,4,400);if(rf()<.3)this.pk.push({x:e.x,y:e.y,hp:rf()<.6,life:9000});return;}}
      if(e.stun>0){e.stun-=ms;return;}
      const sm=e.slow>0?.4:1;if(e.slow>0)e.slow-=ms;
      const edx=p.x-e.x,edy=p.y-e.y,d=Math.hypot(edx,edy);
      const nx=d>0?edx/d:0,ny=d>0?edy/d:0,sms=e.sp*sm*ms*.001;
      if(e.type==='r'){if(!sR(map,e.x+nx*sms,e.y,e.sz))e.x+=nx*sms;if(!sR(map,e.x,e.y+ny*sms,e.sz))e.y+=ny*sms;if(d<e.sz+p.sz+2&&p.if<=0){let dm=e.dmg;if(p.sh>0){const ab=Math.min(p.sh,dm);p.sh-=ab;dm-=ab;}if(dm>0){p.hp-=dm*ms*.002;p.if=260;this.fx(p.x,p.y,'#ff4444',5,2,280);}}}
      else{const pref=e.type==='m'?200:130;let mvx=0,mvy=0;if(d>pref+25){mvx=nx*sms;mvy=ny*sms;}else if(d<pref-25){mvx=-nx*sms*.5;mvy=-ny*sms*.5;}if(!sR(map,e.x+mvx,e.y,e.sz))e.x+=mvx;if(!sR(map,e.x,e.y+mvy,e.sz))e.y+=mvy;if(e.sc>0)e.sc-=ms;else if(d<e.rng){e.sc=e.sr;const ang=Math.atan2(edy,edx),shots=e.type==='h'?3:1;for(let s=0;s<shots;s++){const sp2=(s-(shots-1)/2)*.28,bs=e.type==='h'?5:6;this.ebl.push({x:e.x,y:e.y,vx:Math.cos(ang+sp2)*bs,vy:Math.sin(ang+sp2)*bs,dmg:e.dmg,life:1400});}}}
      e.x=Math.max(TILE+e.sz,Math.min(MW-TILE-e.sz,e.x));e.y=Math.max(TILE+e.sz,Math.min(MH-TILE-e.sz,e.y));
    });
    this.turrets=this.turrets.filter(t=>{t.life-=ms;if(t.life<=0)return false;if(t.cd>0){t.cd-=ms;return true;}let nr=null,nd=Infinity;this.en.forEach(e=>{if(e.a){const d=dst(t,e);if(d<nd){nd=d;nr=e;}}});if(nr&&nd<295){t.cd=460;const ang=Math.atan2(nr.y-t.y,nr.x-t.x);this.bl.push({x:t.x,y:t.y,vx:Math.cos(ang)*9.5,vy:Math.sin(ang)*9.5,dmg:14,col:'#ff8040',sz:5,life:900,fp:1});}return true;});
    this.pk=this.pk.filter(pu=>{pu.life-=ms;if(dst(pu,p)<24){if(pu.hp){p.hp=Math.min(p.mhp,p.hp+30);this.msg('+30 HP','#50ff70');}else{p.mp=Math.min(p.mmp,p.mp+40);this.msg('+40 MP','#5090ff');}return false;}return pu.life>0;});
    this.pts=this.pts.filter(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vx*=.91;pt.vy*=.91;pt.life-=ms;return pt.life>0;});
    this.msgs=this.msgs.map(m=>({...m,t:m.t-dt})).filter(m=>m.t>0);
    if(!this.roomCleared&&!this.en.some(e=>e.a)){this.roomCleared=true;this.msg('Room Cleared!','#f0c060');}
    if(p.hp<=0){p.hp=0;return true;}return false;
  }
  nextRoom(){
    if(!this.roomCleared)return;this.room++;if(this.room>5){this.room=1;this.floor++;}
    this.p.x=MW/2;this.p.y=MH/2;this.p.hp=Math.min(this.p.mhp,this.p.hp+25);
    this.map=genMap(this.floor);this._spawn();
    this.bl=[];this.ebl=[];this.pk=[];this.turrets=[];this.roomCleared=false;
    this.msg(`Floor ${this.floor} — Room ${this.room}`,'#f0c060');
  }
  render(ctx,W,H,cx,cy){
    ctx.save();ctx.translate(-cx,-cy);const t=Date.now();
    // Tiles
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const x=c*TILE,y=r*TILE;if(this.map[r][c]===1){ctx.fillStyle='#12122a';ctx.fillRect(x,y,TILE,TILE);ctx.fillStyle='#1c1c3e';ctx.fillRect(x+2,y+2,TILE-2,TILE-2);ctx.fillStyle='#0c0c1e';ctx.fillRect(x,y,TILE,3);ctx.fillRect(x,y,3,TILE);}else{ctx.fillStyle=((r+c)%2===0)?'#0f0f1e':'#0b0b18';ctx.fillRect(x,y,TILE,TILE);ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=1;ctx.strokeRect(x,y,TILE,TILE);}}
    // Pickups
    this.pk.forEach(pu=>{const pulse=Math.sin(t*.005)*4;ctx.beginPath();ctx.arc(pu.x,pu.y,9+pulse,0,Math.PI*2);ctx.fillStyle=pu.hp?'rgba(220,50,50,.25)':'rgba(50,100,220,.25)';ctx.fill();ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(pu.hp?'❤':'✦',pu.x,pu.y);});
    // Turrets
    this.turrets.forEach(tt=>{ctx.fillStyle='#3a1a08';ctx.fillRect(tt.x-11,tt.y-11,22,22);ctx.fillStyle='#ff8040';ctx.fillRect(tt.x-9,tt.y-9,18,18);ctx.fillStyle='#cc5010';ctx.fillRect(tt.x-3,tt.y-16,6,10);ctx.fillStyle='#1a1a1a';ctx.fillRect(tt.x-13,tt.y+13,26,4);ctx.fillStyle='#ff8040';ctx.fillRect(tt.x-13,tt.y+13,26*(tt.life/15000),4);});
    // Enemies
    this.en.forEach(e=>{
      if(!e.a)return;
      const sF=e.stun>0&&Math.sin(t*.025)>0,slF=e.slow>0,pF=e.pT>0,dF=e.dm>0&&Math.sin(t*.02)>0;
      ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(e.x,e.y+e.sz,e.sz*.85,e.sz*.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=dF?'#ff2244':sF?'#fff':slF?'#aaddff':pF?'#44ff66':e.col;
      ctx.beginPath();
      if(e.type==='h')ctx.rect(e.x-e.sz,e.y-e.sz,e.sz*2,e.sz*2);
      else if(e.type==='m'){for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/2;i===0?ctx.moveTo(e.x+Math.cos(a)*e.sz,e.y+Math.sin(a)*e.sz):ctx.lineTo(e.x+Math.cos(a)*e.sz,e.y+Math.sin(a)*e.sz);}ctx.closePath();}
      else ctx.arc(e.x,e.y,e.sz,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(e.x-5,e.y-4,3,4);ctx.fillRect(e.x+2,e.y-4,3,4);ctx.fillStyle='#111';ctx.fillRect(e.x-4,e.y-3,2,2);ctx.fillRect(e.x+3,e.y-3,2,2);
      const bw=e.sz*3;ctx.fillStyle='#1a1a1a';ctx.fillRect(e.x-bw/2,e.y-e.sz-10,bw,5);ctx.fillStyle=e.hp/e.mhp>.5?'#2ecc71':'#e74c3c';ctx.fillRect(e.x-bw/2,e.y-e.sz-10,bw*(Math.max(0,e.hp)/e.mhp),5);
      if(e.dm>0){ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillStyle='#ff2244';ctx.fillText(`💀${(e.dm/1000).toFixed(1)}`,e.x,e.y-e.sz-16);}
    });
    // Enemy bullets
    this.ebl.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fillStyle='#ff4444';ctx.fill();ctx.strokeStyle='#ff9999';ctx.lineWidth=1;ctx.stroke();});
    // Player bullets
    this.bl.forEach(b=>{const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.sz*2);g.addColorStop(0,b.col);g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(b.x,b.y,b.sz,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();if(b.poi){ctx.beginPath();ctx.arc(b.x,b.y,b.sz+2,0,Math.PI*2);ctx.strokeStyle='#44ff66';ctx.lineWidth=1;ctx.stroke();}});
    // Particles
    this.pts.forEach(pt=>{ctx.globalAlpha=pt.life/pt.ml;ctx.fillStyle=pt.col;ctx.beginPath();ctx.arc(pt.x,pt.y,pt.sz*(pt.life/pt.ml),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
    // Player
    const p=this.p;const flash=p.if>0&&Math.sin(t*.04)>0;
    if(!flash){
      ctx.shadowBlur=20;ctx.shadowColor=this.cls.ac;
      if(p.dMul>1)ctx.shadowColor='#ff9900';if(p.ocT>0)ctx.shadowColor='#ff6600';if(p.sh>0)ctx.shadowColor='#4488ff';
      ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(p.x,p.y+p.sz,p.sz*.85,p.sz*.3,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=this.cls.col;ctx.fillRect(p.x-10,p.y-9,20,18);
      ctx.fillStyle='#f5c89a';ctx.fillRect(p.x-7,p.y-20,14,13);
      ctx.fillStyle='#222';ctx.fillRect(p.x-4+Math.cos(p.ang)*2,p.y-15+Math.sin(p.ang)*2,3,3);ctx.fillRect(p.x+1+Math.cos(p.ang)*2,p.y-15+Math.sin(p.ang)*2,3,3);
      if(p.sh>0){ctx.beginPath();ctx.arc(p.x,p.y,p.sz+7,0,Math.PI*2);ctx.strokeStyle='rgba(68,136,255,.7)';ctx.lineWidth=3;ctx.stroke();}
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.ang);ctx.fillStyle='#777';ctx.fillRect(7,-3,20,6);ctx.fillStyle='#aaa';ctx.fillRect(11,-2,12,4);if(p.sc>this.cls.fr-80){ctx.fillStyle='#ffff88';ctx.beginPath();ctx.arc(27,0,5,0,Math.PI*2);ctx.fill();}ctx.restore();ctx.shadowBlur=0;
    }
    this.msgs.forEach((m,i)=>{ctx.globalAlpha=Math.min(1,m.t);ctx.font='bold 10px "Press Start 2P",monospace';ctx.fillStyle=m.col;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(m.txt,p.x,p.y-56-i*18);});ctx.globalAlpha=1;
    if(this.roomCleared){ctx.fillStyle='rgba(240,192,96,.07)';ctx.fillRect(0,0,MW,MH);}
    ctx.restore();
  }
}

// ── MAIN ─────────────────────────────────
let game=null,raf=null,dead=false,mx=0,my=0,md=false;
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const titleSc=document.getElementById('titleSc'),gWrap=document.getElementById('gameWrap'),goScr=document.getElementById('goScr');
const fBanner=document.getElementById('fBanner');let bTO=null;
function showBanner(txt){fBanner.textContent=txt;fBanner.style.opacity='1';clearTimeout(bTO);bTO=setTimeout(()=>fBanner.style.opacity='0',2400);}
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();
const isTD=()=>window.matchMedia('(pointer:coarse)').matches;

function upHUD(){
  if(!game)return;const p=game.p;
  document.getElementById('hpFill').style.width=(Math.max(0,p.hp)/p.mhp*100)+'%';
  document.getElementById('mpFill').style.width=(p.mp/p.mmp*100)+'%';
  document.getElementById('statF').textContent=`FL.${game.floor} RM.${game.room}`;
  document.getElementById('statK').textContent=`☠ ${game.kills}`;
  document.getElementById('statC').textContent=game.cls.name;
  game.sks.forEach((sk,i)=>{
    document.getElementById(`s${i}e`).textContent=sk.emoji;
    const cd=document.getElementById(`s${i}c`),sl=document.getElementById(`sk${i}`);
    if(sk.cl>0){cd.style.display='flex';cd.textContent=(sk.cl/1000).toFixed(1);sl.className='sk ocd';}
    else{cd.style.display='none';sl.className='sk rdy';}
  });
  document.getElementById('nrBtn').style.display=game.roomCleared?'block':'none';
}

function loop(){
  if(!game||dead)return;
  const W=canvas.width,H=canvas.height;
  if(!isTD()){const camX=Math.max(0,Math.min(MW-W,game.p.x-W/2)),camY=Math.max(0,Math.min(MH-H,game.p.y-H/2));game.p.ang=Math.atan2((my+camY)-game.p.y,(mx+camX)-game.p.x);game.inp.sh=md;}
  const d=game.update(1/60);
  if(d){dead=true;endGame();return;}
  const camX=Math.max(0,Math.min(MW-W,game.p.x-W/2)),camY=Math.max(0,Math.min(MH-H,game.p.y-H/2));
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  game.render(ctx,W,H,camX,camY);
  if(!isTD()){ctx.save();ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(mx,my,8,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(mx-12,my);ctx.lineTo(mx+12,my);ctx.stroke();ctx.beginPath();ctx.moveTo(mx,my-12);ctx.lineTo(mx,my+12);ctx.stroke();ctx.restore();}
  upHUD();raf=requestAnimationFrame(loop);
}
function startGame(idx){dead=false;game=new Game(idx);titleSc.classList.add('hidden');goScr.classList.add('hidden');gWrap.classList.remove('hidden');showBanner('FLOOR 1  BEGIN!');if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);}
function endGame(){cancelAnimationFrame(raf);const c=game.cls;document.getElementById('goStats').innerHTML=`Character: <span>${c.name}</span><br>Class: <span>${c.label}</span><br>Floor: <span>${game.floor}</span><br>Room: <span>${game.room}</span><br>Kills: <span>${game.kills}</span>`;gWrap.classList.add('hidden');goScr.classList.remove('hidden');}
document.getElementById('retryBtn').onclick=()=>{goScr.classList.add('hidden');titleSc.classList.remove('hidden');};
window.addEventListener('keydown',e=>{if(!game)return;const k=e.key.toLowerCase();game.keys[k]=true;if(e.key===' ')e.preventDefault();if(k==='e'&&game.roomCleared){game.nextRoom();showBanner(`Floor ${game.floor}  Room ${game.room}`);}if(k==='1')game.use(0);if(k==='2')game.use(1);if(k==='3')game.use(2);if(k==='4')game.use(3);});
window.addEventListener('keyup',e=>{if(game)game.keys[e.key.toLowerCase()]=false;});
canvas.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
canvas.addEventListener('mousedown',e=>{if(e.button===0)md=true;});
canvas.addEventListener('mouseup',e=>{if(e.button===0)md=false;});
window.addEventListener('blur',()=>{md=false;if(game)game.keys={};});
for(let i=0;i<4;i++){const el=document.getElementById(`sk${i}`);el.addEventListener('click',()=>{if(game)game.use(i);});el.addEventListener('touchstart',e=>{e.preventDefault();if(game)game.use(i);},{passive:false});}
// Joystick
const jZ=document.getElementById('jZone'),jK=document.getElementById('jKnob'),sB=document.getElementById('sBtn'),nrB=document.getElementById('nrBtn');
let jId=-1,jOx=0,jOy=0;const JR=55;
const jC=()=>{const r=jZ.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};};
jZ.addEventListener('touchstart',e=>{e.preventDefault();const tc=e.changedTouches[0];jId=tc.identifier;const c=jC();jOx=c.x;jOy=c.y;upJ(tc.clientX,tc.clientY);},{passive:false});
jZ.addEventListener('touchmove',e=>{e.preventDefault();for(const tc of e.changedTouches)if(tc.identifier===jId)upJ(tc.clientX,tc.clientY);},{passive:false});
jZ.addEventListener('touchend',e=>{e.preventDefault();for(const tc of e.changedTouches)if(tc.identifier===jId){jId=-1;jK.style.transform='translate(-50%,-50%)';if(game){game.inp.dx=0;game.inp.dy=0;}}},{passive:false});
function upJ(cx,cy){const dx=cx-jOx,dy=cy-jOy,d=Math.min(Math.hypot(dx,dy),JR),a=Math.atan2(dy,dx);jK.style.transform=`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px))`;if(game){game.inp.dx=Math.cos(a)*(d/JR);game.inp.dy=Math.sin(a)*(d/JR);autoAim();}}
function autoAim(){if(!game)return;let nr=null,nd=Infinity;game.en.forEach(e=>{if(e.a){const d=dst(e,game.p);if(d<nd){nd=d;nr=e;}}});if(nr)game.p.ang=Math.atan2(nr.y-game.p.y,nr.x-game.p.x);}
sB.addEventListener('touchstart',e=>{e.preventDefault();if(game){game.inp.sh=true;sB.classList.add('f');}},{passive:false});
sB.addEventListener('touchend',e=>{e.preventDefault();if(game){game.inp.sh=false;sB.classList.remove('f');}},{passive:false});
nrB.addEventListener('touchstart',e=>{e.preventDefault();if(game&&game.roomCleared){game.nextRoom();showBanner(`Floor ${game.floor}  Room ${game.room}`);}},{passive:false});
nrB.addEventListener('click',()=>{if(game&&game.roomCleared){game.nextRoom();showBanner(`Floor ${game.floor}  Room ${game.room}`);}});
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
canvas.addEventListener('contextmenu',e=>e.preventDefault());
buildSel(startGame);
(function idleDraw(){if(game&&!dead)return;ctx.fillStyle='#050508';ctx.fillRect(0,0,canvas.width,canvas.height);const t=Date.now()*.0005;for(let i=0;i<18;i++){const px=(Math.sin(t*.6+i*2.4)*.5+.5)*canvas.width,py=(Math.cos(t*.4+i*1.7)*.5+.5)*canvas.height;ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fillStyle=`rgba(240,192,96,${.05+Math.sin(t*3+i)*.04})`;ctx.fill();}requestAnimationFrame(idleDraw);})();
</script>
</body>
